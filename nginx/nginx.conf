events {}

http {
  server {
    listen 80;

    # Sample app
    location / {
      proxy_pass http://sample-app:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Keycloak admin & auth
    location /keycloak/ {
      proxy_pass http://keycloak:8080/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_buffer_size 128k;
      proxy_buffers 4 256k;
    }
  }
}
